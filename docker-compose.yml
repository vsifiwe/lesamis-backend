services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: les_amis
      POSTGRES_USER: les_amis
      POSTGRES_PASSWORD: les_amis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U les_amis -d les_amis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    environment:
      DB_NAME: les_amis
      DB_USER: les_amis
      DB_PASSWORD: les_amis
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: